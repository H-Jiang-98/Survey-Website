name: Validate image policy (PR)

# 只在 PR 上跑，且只校验本次改动的 markdown：
# 新增/修改的论文若含本地图片 -> CI 失败，必须改成在线 URL 才能合并。
# 历史遗留的本地图论文不会阻塞无关 PR。

on:
  pull_request:
    paths:
      - '**/*.md'
      - build.py

jobs:
  image-policy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # 需要完整历史以便与 base 比较

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install pyyaml

      - name: Collect changed markdown files
        id: diff
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          FILES=$(git diff --name-only --diff-filter=ACM "$BASE_SHA" HEAD -- '*.md' | tr '\n' ' ')
          echo "Changed markdown: ${FILES:-<none>}"
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Ensure new markdown notes live under markdown_files/
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          ADDED=$(git diff --name-only --diff-filter=A "$BASE_SHA" HEAD -- '*.md')
          BAD=""
          for f in $ADDED; do
            case "$f" in
              markdown_files/*) ;;                  # 正确位置，build.py 会收录
              README.md|CONTRIBUTING.md) ;;         # 允许的根目录文档
              *) BAD="$BAD $f" ;;
            esac
          done
          if [ -n "$BAD" ]; then
            echo "✗ 以下新增 markdown 未放在 markdown_files/ 目录下：$BAD"
            echo "  论文笔记必须放入 markdown_files/，否则不会被 build.py 收录。"
            exit 1
          fi
          echo "✓ 新增 markdown 均位于 markdown_files/（或允许的根目录文档）。"

      - name: Enforce online-image policy on changed notes
        run: |
          if [ -z "${{ steps.diff.outputs.files }}" ]; then
            echo "本次 PR 无 markdown 改动，跳过校验。"
            exit 0
          fi
          python build.py --check ${{ steps.diff.outputs.files }}
